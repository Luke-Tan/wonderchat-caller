;; ============================================================================
;; Asterisk dialplan — bridge URL Networks inbound to dynamic Retell SIP URI
;; ============================================================================
[globals]
RETELL_SIP_DOMAIN=${ENV(RETELL_SIP_DOMAIN)}

;; Inbound from URL Networks. Matches any DID (_X. = one or more digits).
[from-url-networks]
exten => _X.,1,NoOp(Inbound from URL Networks: ${CALLERID(num)} -> ${EXTEN})
 same => n,Set(CHANNEL(language)=en)
 same => n,Set(CALLER_NUM=${CALLERID(num)})
 same => n,Set(DID=${EXTEN})
 ;; Register the call with Retell. The AGI sets RETELL_SIP_URI (or RETELL_ERROR).
 same => n,AGI(/opt/agi/register-retell-call.mjs,${CALLER_NUM},${DID},${UNIQUEID})
 same => n,GotoIf($["${RETELL_ERROR}" != ""]?fallback)
 same => n,NoOp(Dialing Retell at ${RETELL_SIP_URI})
 ;; Dial the dynamic per-call URI through the [retell] endpoint. 30s ring.
 ;; PJSIP/<endpoint>/<request-uri> overrides the target URI per call.
 ;; b(...) runs a pre-dial hook on the OUTBOUND channel to attach the call id.
 same => n,Dial(PJSIP/retell/${RETELL_SIP_URI},30,b(pre-retell^addheader^1))
 same => n,NoOp(Dial ended: ${DIALSTATUS})
 same => n,Hangup()

 same => n(fallback),NoOp(Retell registration failed: ${RETELL_ERROR})
 same => n,GotoIf($["${ENV(ERROR_FALLBACK_MODE)}" = "play_message"]?playmsg)
 same => n,GotoIf($["${ENV(ERROR_FALLBACK_MODE)}" = "forward_to_backup_number"]?backup)
 same => n,Hangup()

 same => n(playmsg),Answer()
 same => n,Playback(sorry-cant-connect-call&pls-try-call-later)
 same => n,Hangup()

 same => n(backup),Dial(PJSIP/${ENV(BACKUP_NUMBER)}@urlnetworks,30)
 same => n,Hangup()

;; Pre-dial subroutine: stamp the Retell call id onto the outbound INVITE.
[pre-retell]
exten => addheader,1,Set(PJSIP_HEADER(add,X-Retell-Call-Id)=${RETELL_CALL_ID})
 same => n,Return()

;; Return path from Retell (rarely used for inbound bridging; here for safety).
[from-retell]
exten => _X.,1,NoOp(Unexpected inbound from Retell: ${EXTEN})
 same => n,Hangup()
