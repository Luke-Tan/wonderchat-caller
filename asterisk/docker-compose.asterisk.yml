# ─────────────────────────────────────────────────────────────────────────────
# Asterisk SIP/media layer — self-contained, no Jambonz license.
#
#   cd asterisk && docker compose -f docker-compose.asterisk.yml up -d --build
#
# Builds a Debian-based Asterisk image with Node (for the Retell AGI) + envsubst
# (renders pjsip.conf from .env at boot). Host networking is REQUIRED so SIP/RTP
# use the real interface, not Docker's NAT bridge.
#
# All env comes from ../.env via `env_file` (loaded into the container). We do
# NOT use compose ${VAR} interpolation here — that reads a .env next to THIS
# file, which doesn't exist, and would blank out the values.
# ─────────────────────────────────────────────────────────────────────────────
services:
  asterisk:
    build:
      context: .
      dockerfile: Dockerfile
    image: retell-asterisk:latest
    restart: unless-stopped
    network_mode: host          # SIP 5060 + RTP range on the host interface
    env_file: ../.env           # SIP_*, RETELL_*, PUBLIC_IP -> container env
    volumes:
      # pjsip.conf is a TEMPLATE rendered by the entrypoint (has ${SIP_*} vars).
      - ./pjsip.conf:/etc/asterisk/templates/pjsip.conf:ro
      # Used as-is (only Asterisk ${ENV()}/dialplan tokens, no shell vars).
      - ./extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./rtp.conf:/etc/asterisk/rtp.conf:ro
      - ./modules.conf:/etc/asterisk/modules.conf:ro
      # AGI mounted at a fixed path; the dialplan calls it by absolute path
      # (/opt/agi/...) so it works regardless of Asterisk's astagidir default.
      # rw so the entrypoint can ensure the AGI is executable.
      - ./agi:/opt/agi
