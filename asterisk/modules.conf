[modules]
autoload=yes
; We use PJSIP only. The legacy chan_sip would ALSO try to bind UDP 5060 and
; collide with res_pjsip's transport (-> registration silently fails). Don't
; load it. Also skip chan_iax2/dahdi which we don't use.
noload => chan_sip.so
noload => chan_iax2.so
noload => chan_dahdi.so
