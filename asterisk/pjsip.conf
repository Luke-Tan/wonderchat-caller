;; ============================================================================
;; Asterisk PJSIP config — URL Networks inbound  +  Retell outbound
;; Alternative SIP/media layer (use when Jambonz is too heavy for the target VPS)
;; Tested shape for Asterisk 20/21 (modern PJSIP). Fill in ${...} from .env.
;; ============================================================================

;; ---- Transports ------------------------------------------------------------
[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060
;; Tell Asterisk its public address so SDP/Contact use the routable IP (NAT).
external_media_address = ${PUBLIC_IP}
external_signaling_address = ${PUBLIC_IP}
;; Treat RFC1918 as local so NAT rewriting only happens toward the public side.
local_net = 10.0.0.0/8
local_net = 172.16.0.0/12
local_net = 192.168.0.0/16

[transport-tcp]
type = transport
protocol = tcp
bind = 0.0.0.0:5060
external_media_address = ${PUBLIC_IP}
external_signaling_address = ${PUBLIC_IP}

;; ============================================================================
;; URL NETWORKS  — REGISTRATION TRUNK  (confirmed: WE register TO them)
;; We log in with SIP_USERNAME/SIP_PASSWORD; inbound calls arrive back over the
;; registered connection. `line=yes` + `endpoint=urlnetworks` is what matches
;; those inbound INVITEs to our endpoint/context — this is the critical glue.
;;
;; Env mapping (fill from URL Networks; reuse the exact values 3CX used):
;;   SIP_REGISTRAR = registrar host          (where REGISTER is sent)
;;   SIP_REALM     = auth realm / SIP domain  (digest realm; often == registrar)
;;   SIP_PROXY     = outbound proxy / gateway  (where INVITEs are sent; may == registrar)
;;   SIP_USERNAME / SIP_PASSWORD = trunk credentials
;; If registrar == proxy == realm (common), set all three to the same host.
;; ============================================================================
[urlnetworks-reg]
type = registration
transport = transport-udp
outbound_auth = urlnetworks-auth
server_uri = sip:${SIP_REGISTRAR}
client_uri = sip:${SIP_USERNAME}@${SIP_REALM}
contact_user = ${SIP_USERNAME}
retry_interval = 30
forbidden_retry_interval = 60
expiration = 300
;; line=yes tags REGISTER so URL Networks' inbound calls map back to the endpoint.
line = yes
endpoint = urlnetworks
;; Uncomment if URL Networks gives a SEPARATE outbound proxy (different from
;; the registrar). Otherwise leave server_uri as the registrar.
;; outbound_proxy = sip:${SIP_PROXY}\;lr

[urlnetworks-auth]
type = auth
auth_type = userpass
username = ${SIP_USERNAME}
password = ${SIP_PASSWORD}
;; NOTE: realm intentionally omitted. For OUTBOUND registration auth, PJSIP
;; responds to whatever realm the server challenges with — hardcoding a wrong
;; realm causes 401 loops. Only set `realm =` if URL Networks tells you a
;; specific one and auto-match fails.

[urlnetworks-aor]
type = aor
;; Where OUTBOUND INVITEs (e.g. backup-number fallback) are sent.
contact = sip:${SIP_PROXY}
qualify_frequency = 30

[urlnetworks]
type = endpoint
transport = transport-udp
context = from-url-networks
disallow = all
allow = ulaw          ; PCMU/G.711 µ-law — matches Retell (also try alaw)
allow = alaw          ; PCMA/G.711 A-law
direct_media = no     ; keep media on Asterisk so we can bridge + NAT cleanly
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
from_user = ${SIP_USERNAME}
from_domain = ${SIP_REALM}
aors = urlnetworks-aor
outbound_auth = urlnetworks-auth
;; outbound_proxy = sip:${SIP_PROXY}\;lr   ; uncomment if separate proxy
;; Belt-and-suspenders: also match inbound by URL Networks' source host so a
;; dropped registration doesn't black-hole calls. Set match to their proxy
;; IP/CIDR or hostname (ask URL Networks). Harmless to leave commented.
;; [urlnetworks-identify]
;; type = identify
;; endpoint = urlnetworks
;; match = ${SIP_PROXY}

;; ============================================================================
;; RETELL  — outbound endpoint we Dial the dynamic SIP URI through.
;; The user part is per-call (sip:{call_id}@...), so we keep a generic endpoint
;; and pass the full target URI in the dialplan Dial() string.
;; ============================================================================
[retell]
type = endpoint
transport = transport-tcp        ; Retell recommends TCP; can use udp/tls
context = from-retell
disallow = all
allow = ulaw
allow = alaw
allow = g722
direct_media = no
rtp_symmetric = yes
rewrite_contact = yes
from_domain = ${RETELL_SIP_DOMAIN}

[retell-aor]
type = aor
;; Default host; the per-call dial overrides the user part at Dial() time.
contact = sip:${RETELL_SIP_DOMAIN}
qualify_frequency = 0

;; Trust inbound from Retell SBC ranges (audio/return signaling). Whitelist in
;; the OS firewall too — see docs/SETUP.md.
[retell-identify]
type = identify
endpoint = retell
match = 18.98.16.120/30
match = 3.42.144.0/23
match = 143.223.88.0/21
match = 161.115.160.0/19
